<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MLflow Viewport Settings</title>
  <style>
    body {
      width: 450px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      color: #333;
    }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .url-list { list-style: none; padding: 0; margin: 0 0 12px; }
    .url-list li {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid #eee;
    }
    .url-list li span { flex: 1; font-size: 13px; word-break: break-all; }
    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-row input {
      flex: 1; padding: 6px 8px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 13px;
    }
    button {
      padding: 6px 12px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .btn-add { background: #4CAF50; color: #fff; }
    .btn-add:hover { background: #45a049; }
    .btn-remove { background: #f44336; color: #fff; font-size: 11px; padding: 4px 8px; }
    .btn-remove:hover { background: #d32f2f; }
    #status {
      font-size: 12px; padding: 6px; border-radius: 4px;
      display: none; margin-top: 8px; text-align: center;
    }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    .hint { font-size: 11px; color: #888; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>MLflow Server URLs</h2>
  <p class="hint">Add the base URLs of your MLflow servers (e.g. <code>http://localhost:5000</code>). The extension will only activate on these pages.</p>
  <ul class="url-list" id="urlList"></ul>
  <div class="add-row">
    <input type="text" id="newUrl" placeholder="http://localhost:5000">
    <button class="btn-add" id="addBtn">Add</button>
  </div>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
